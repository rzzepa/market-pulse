services:

  postgres:
    image: postgres:16
    container_name: market_pulse_db
    environment:
      POSTGRES_DB: market_pulse_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  pipeline:
    build: .
    container_name: market_pulse_pipeline
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    command: python run_daily.py

  dashboard:
    build: .
    container_name: market_pulse_dashboard
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    command: streamlit run src/dashboard.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"

volumes:
  postgres_data: